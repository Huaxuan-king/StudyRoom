<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<title>自习室</title>
<style>
:root {
  --font: -apple-system, 'Helvetica Neue', 'PingFang SC', sans-serif;
  --font-mono: 'SF Mono', 'Menlo', 'PingFang SC', monospace;
  --radius-sm: 10px;
  --radius: 16px;
  --radius-lg: 24px;
  --radius-xl: 32px;
  --radius-dock: 28px;
  --blur: 50px;
  --blur-heavy: 70px;
  --scene-tint: rgba(212,168,106,0.08);
  --glass-bg: rgba(255,255,255,0.08);
  --glass-border: rgba(255,255,255,0.12);
  --glass-shadow: 0 8px 48px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.08);
  --glass-inner: inset 0 0 0 0.5px rgba(255,255,255,0.06);
  --text: #f0ece6;
  --text-secondary: rgba(255,255,255,0.55);
  --text-tertiary: rgba(255,255,255,0.3);
  --accent: #d4a86a;
  --accent-glow: rgba(212,168,106,0.2);
  --dock-bg: rgba(20,18,16,0.5);
  --dock-border: rgba(255,255,255,0.06);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  height: 100%; overflow: hidden;
  font-family: var(--font);
  background: #0a0a0a;
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  -webkit-tap-highlight-color: transparent;
}

/* ── Scene ── */
.scene {
  position: fixed; inset: 0; z-index: 0;
  background: #0d0b0a;
  transition: background 0.8s ease;
}
.scene-layer {
  position: absolute; inset: 0;
  background-size: cover; background-position: center;
  opacity: 0; transition: opacity 0.8s ease;
}
.scene-layer.active { opacity: 1; }
.scene-overlay {
  position: absolute; inset: 0; z-index: 1;
  background: linear-gradient(180deg, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.4) 100%);
  pointer-events: none;
}
.scene-tint {
  position: absolute; inset: 0; z-index: 2;
  background: var(--scene-tint);
  pointer-events: none;
  transition: background 0.8s ease;
}
.scene-vignette {
  position: absolute; inset: 0; z-index: 3;
  background: radial-gradient(ellipse 100% 60% at 50% 100%, rgba(0,0,0,0.5), transparent 70%);
  pointer-events: none;
}

/* ── Particles ── */
.particles { position: fixed; inset: 0; z-index: 1; pointer-events: none; overflow: hidden; }
.particle {
  position: absolute; border-radius: 50%;
  animation: float linear infinite;
  pointer-events: none;
}
@keyframes float {
  0% { transform: translateY(100vh) scale(0); opacity: 0; }
  10% { opacity: 0.6; }
  90% { opacity: 0.4; }
  100% { transform: translateY(-10vh) scale(1); opacity: 0; }
}

/* ── Core Layout ── */
.app {
  position: fixed; inset: 0; z-index: 4;
  display: flex; flex-direction: column;
  padding: 40px 20px 90px;
  overflow: hidden;
}
.app-inner {
  flex: 1;
  display: flex; flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

/* ── Liquid Glass Card ── */
.glass-card {
  background: var(--glass-bg);
  backdrop-filter: blur(var(--blur)) saturate(1.3);
  -webkit-backdrop-filter: blur(var(--blur)) saturate(1.3);
  border: 0.5px solid var(--glass-border);
  border-radius: var(--radius-xl);
  box-shadow: var(--glass-shadow);
  width: 100%;
  max-width: 420px;
  max-height: 85vh;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  position: relative;
  transition: opacity 0.35s ease, transform 0.35s cubic-bezier(0.25,0.1,0.25,1), background 0.6s ease;
}
.glass-card::before {
  content: '';
  position: absolute; top: 0; left: 10%; right: 10%; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
  pointer-events: none;
}
.glass-card::-webkit-scrollbar { width: 2px; }
.glass-card::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 1px; }

.tool-content { display: none; padding: 36px 32px 32px; }
.tool-content.active { display: block; }

.tool-header {
  text-align: center;
  margin-bottom: 24px;
}
.tool-header .icon { font-size: 20px; opacity: 0.5; margin-bottom: 6px; }
.tool-header h2 {
  font-size: 14px;
  font-weight: 500;
  letter-spacing: 4px;
  color: var(--text-secondary);
  text-transform: uppercase;
}

/* ── Timer ── */
.timer-ring-wrap {
  position: relative;
  width: 200px; height: 200px;
  margin: 0 auto 24px;
}
.timer-ring-wrap::after {
  content: '';
  position: absolute; inset: -12px;
  border-radius: 50%;
  background: radial-gradient(ellipse 50% 30% at 50% 40%, var(--accent-glow), transparent 70%);
  pointer-events: none;
}
.timer-ring-wrap svg {
  transform: rotate(-90deg);
  width: 100%; height: 100%;
  filter: drop-shadow(0 0 8px rgba(212,168,106,0.1));
}
.timer-ring-bg { fill: none; stroke: rgba(255,255,255,0.04); stroke-width: 3; }
.timer-ring-fg {
  fill: none; stroke: var(--accent); stroke-width: 3;
  stroke-linecap: round;
  transition: stroke-dashoffset 0.6s cubic-bezier(0.25,0.1,0.25,1);
}
.timer-display {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
}
.timer-display .time {
  font-family: var(--font-mono);
  font-size: 58px; font-weight: 300;
  letter-spacing: 6px; color: var(--text);
  line-height: 1; font-variant-numeric: tabular-nums;
  text-shadow: 0 0 30px rgba(212,168,106,0.08);
}
.timer-display .label {
  font-size: 10px; font-weight: 500;
  letter-spacing: 6px; color: var(--text-tertiary);
  margin-top: 10px; text-transform: uppercase;
}

.modes { display: flex; gap: 4px; justify-content: center; margin-bottom: 24px; background: rgba(255,255,255,0.03); border-radius: 40px; padding: 3px; width: fit-content; margin-left: auto; margin-right: auto; }
.modes button {
  font-family: var(--font); font-size: 11px; font-weight: 500;
  padding: 6px 18px; border-radius: 40px; border: none;
  background: transparent; color: var(--text-tertiary);
  cursor: pointer; transition: all 0.25s; letter-spacing: 1px;
  -webkit-tap-highlight-color: transparent;
}
.modes button.active {
  background: rgba(212,168,106,0.12);
  color: var(--accent);
}

.actions { display: flex; gap: 8px; justify-content: center; }
.actions button {
  font-family: var(--font); font-size: 13px; font-weight: 500;
  padding: 10px 28px; border-radius: 40px; border: 0.5px solid rgba(255,255,255,0.06);
  cursor: pointer; transition: all 0.25s; min-width: 90px;
  -webkit-tap-highlight-color: transparent;
}
.actions button:active { transform: scale(0.94); }
.btn-primary {
  background: rgba(212,168,106,0.12);
  color: var(--accent);
  border-color: rgba(212,168,106,0.15) !important;
}
.btn-primary:hover { background: rgba(212,168,106,0.2); }
.btn-secondary { background: rgba(255,255,255,0.04); color: var(--text-tertiary); }

.focus-line {
  text-align: center; font-size: 10px;
  color: var(--text-tertiary); margin-top: 20px;
  letter-spacing: 3px; min-height: 14px; font-style: italic;
}

/* ── Todo ── */
.todo-input-row { display: flex; gap: 8px; margin-bottom: 12px; }
.todo-input-row input {
  flex: 1; font-family: var(--font); font-size: 13px; font-weight: 400;
  padding: 10px 14px; border-radius: 12px; border: 0.5px solid rgba(255,255,255,0.06);
  background: rgba(255,255,255,0.04); color: var(--text); outline: none;
}
.todo-input-row input:focus { background: rgba(255,255,255,0.08); }
.todo-input-row input::placeholder { color: var(--text-tertiary); }
.todo-input-row button {
  font-family: var(--font); font-size: 12px; font-weight: 500;
  padding: 10px 16px; border-radius: 12px; border: 0.5px solid rgba(212,168,106,0.15);
  background: rgba(212,168,106,0.1); color: var(--accent); cursor: pointer;
}
.todo-input-row button:active { transform: scale(0.94); }

.todo-list { list-style: none; }
.todo-list li { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 0.5px solid rgba(255,255,255,0.03); }
.todo-list li:last-child { border-bottom: none; }
.todo-list li .check {
  width: 18px; height: 18px; border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.1); cursor: pointer; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; transition: all 0.2s;
}
.todo-list li .check.done { background: rgba(212,168,106,0.2); border-color: rgba(212,168,106,0.3); }
.todo-list li .check.done::after { content: ''; width: 6px; height: 3px; border-left: 1px solid var(--accent); border-bottom: 1px solid var(--accent); transform: rotate(-45deg) translateY(-1px); }
.todo-list li .text { flex: 1; font-size: 13px; font-weight: 400; }
.todo-list li .text.done { text-decoration: line-through; color: var(--text-tertiary); }
.todo-list li .del { font-size: 11px; color: var(--text-tertiary); cursor: pointer; padding: 4px; background: none; border: none; }

/* ── Notes ── */
.notes-area {
  width: 100%; min-height: 200px;
  font-family: var(--font); font-size: 13px; font-weight: 400;
  padding: 14px; border-radius: 12px;
  border: 0.5px solid rgba(255,255,255,0.06);
  background: rgba(255,255,255,0.03);
  color: var(--text); outline: none; resize: vertical;
  line-height: 1.7;
}
.notes-area:focus { background: rgba(255,255,255,0.05); }
.notes-area::placeholder { color: var(--text-tertiary); }
.notes-footer {
  display: flex; justify-content: space-between; align-items: center;
  margin-top: 10px; font-size: 10px; color: var(--text-tertiary);
}
.notes-footer button {
  font-size: 10px; font-weight: 500; padding: 5px 12px;
  border-radius: 12px; border: 0.5px solid rgba(255,255,255,0.06);
  background: rgba(255,255,255,0.04); color: var(--text-secondary); cursor: pointer;
}
.notes-footer button:active { transform: scale(0.94); }

/* ── Sounds ── */
.sound-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
.sound-btn {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  padding: 12px 4px; border-radius: 12px; border: 0.5px solid transparent;
  background: rgba(255,255,255,0.03); cursor: pointer; transition: all 0.25s;
  -webkit-tap-highlight-color: transparent;
}
.sound-btn:active { transform: scale(0.94); }
.sound-btn .icon { font-size: 18px; line-height: 1; }
.sound-btn .sname { font-size: 9px; font-weight: 500; color: var(--text-tertiary); }
.sound-btn.playing {
  background: rgba(212,168,106,0.08);
  border-color: rgba(212,168,106,0.15);
}
.sound-btn.playing .sname { color: var(--accent); }

.vol-row { display: flex; align-items: center; gap: 10px; justify-content: center; margin-top: 14px; }
.vol-row input[type="range"] {
  width: 120px; height: 2px;
  -webkit-appearance: none; appearance: none;
  background: rgba(255,255,255,0.06); border-radius: 1px; outline: none;
}
.vol-row input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 14px; height: 14px;
  border-radius: 50%; background: var(--accent); cursor: pointer;
  border: none; box-shadow: 0 0 6px rgba(212,168,106,0.2);
}
.vol-row .vol-label { font-size: 11px; font-weight: 500; color: var(--text-tertiary); min-width: 28px; text-align: right; }

/* ── Stats ── */
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.stat-cell {
  padding: 16px; border-radius: 14px;
  background: rgba(255,255,255,0.03);
  border: 0.5px solid rgba(255,255,255,0.04);
  text-align: center;
}
.stat-cell .num {
  font-family: var(--font-mono); font-size: 28px; font-weight: 300;
  color: var(--text); letter-spacing: 2px;
}
.stat-cell .lbl { font-size: 10px; font-weight: 500; color: var(--text-tertiary); margin-top: 4px; letter-spacing: 1px; }
.stat-cell.full { grid-column: 1 / -1; }
.stat-cell.full .num { font-size: 36px; }

/* ── Dock ── */
.dock-wrap {
  position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
  z-index: 10;
  padding: 0 8px;
}
.dock {
  display: flex;
  align-items: center;
  gap: 2px;
  background: var(--dock-bg);
  backdrop-filter: blur(60px) saturate(1.4);
  -webkit-backdrop-filter: blur(60px) saturate(1.4);
  border: 0.5px solid var(--dock-border);
  border-radius: var(--radius-dock);
  padding: 4px 6px;
  box-shadow: 0 4px 32px rgba(0,0,0,0.4), inset 0 0.5px 0 rgba(255,255,255,0.04);
}
.dock-section {
  display: flex;
  align-items: center;
  gap: 2px;
}
.dock-divider {
  width: 0.5px; height: 24px;
  background: rgba(255,255,255,0.06);
  margin: 0 4px;
}
.dock-item {
  position: relative;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  width: 44px; height: 40px;
  border-radius: 12px;
  border: none;
  background: transparent;
  cursor: pointer;
  transition: all 0.2s cubic-bezier(0.25,0.1,0.25,1);
  -webkit-tap-highlight-color: transparent;
}
.dock-item:active { transform: scale(0.88); }
.dock-item .icon { font-size: 18px; line-height: 1; transition: transform 0.2s; }
.dock-item .label {
  position: absolute; bottom: -16px;
  font-size: 8px; font-weight: 500;
  color: var(--text-tertiary);
  opacity: 0; transition: opacity 0.2s;
  white-space: nowrap;
  letter-spacing: 0.5px;
}
.dock-item.active .icon { transform: scale(1.1); }
.dock-item.active { background: rgba(212,168,106,0.12); }
.dock-item.active .label { opacity: 0.6; }
.dock-item.scene-btn { width: 32px; height: 32px; border-radius: 8px; }
.dock-item.scene-btn .icon { font-size: 14px; }
.dock-item.scene-btn.active { background: rgba(255,255,255,0.06); }
.dock-item.scene-btn.active::after {
  content: ''; position: absolute; bottom: 2px;
  width: 12px; height: 2px;
  background: var(--accent); border-radius: 1px;
}
.dock-item.ai-btn {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: linear-gradient(135deg, rgba(212,168,106,0.15), rgba(212,168,106,0.05));
  border: 0.5px solid rgba(212,168,106,0.15);
}
.dock-item.ai-btn .icon { font-size: 15px; }

/* ── AI Panel ── */
.ai-overlay {
  position: fixed; inset: 0; z-index: 8;
  background: rgba(0,0,0,0.4);
  opacity: 0; pointer-events: none;
  transition: opacity 0.4s ease;
}
.ai-overlay.open { opacity: 1; pointer-events: auto; }

.ai-panel {
  position: fixed; left: 0; right: 0; bottom: 0; z-index: 9;
  height: 70vh; max-height: 600px;
  background: rgba(15,13,12,0.9);
  backdrop-filter: blur(60px);
  -webkit-backdrop-filter: blur(60px);
  border: 0.5px solid rgba(255,255,255,0.06);
  border-radius: var(--radius-xl) var(--radius-xl) 0 0;
  box-shadow: 0 -8px 40px rgba(0,0,0,0.4);
  transform: translateY(100%);
  transition: transform 0.4s cubic-bezier(0.25,0.1,0.25,1);
  display: flex; flex-direction: column;
}
.ai-panel.open { transform: translateY(0); }

.ai-handle {
  display: flex; justify-content: center; align-items: center;
  padding: 10px; cursor: pointer; flex-shrink: 0;
}
.ai-handle .bar {
  width: 36px; height: 4px;
  background: rgba(255,255,255,0.15);
  border-radius: 2px;
}
.ai-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 0 20px 12px; flex-shrink: 0;
}
.ai-header h3 { font-size: 13px; font-weight: 600; color: var(--text); letter-spacing: 2px; }
.ai-header .close {
  width: 28px; height: 28px; border-radius: 50%;
  border: none; background: rgba(255,255,255,0.04);
  color: var(--text-tertiary); font-size: 14px; cursor: pointer;
}
.ai-iframe-wrap {
  flex: 1; margin: 0 8px 8px; border-radius: var(--radius);
  overflow: hidden; background: #fff;
}
.ai-iframe-wrap iframe {
  width: 100%; height: 100%; border: none;
}

/* ── Scene Switcher strip ── */
.scene-strip {
  display: flex; gap: 6px;
}

/* ── Empty state ── */
.empty-state {
  text-align: center; padding: 40px 0;
  color: var(--text-tertiary);
}
.empty-state .icon { font-size: 32px; margin-bottom: 10px; opacity: 0.4; }
.empty-state p { font-size: 12px; font-weight: 400; }

/* ── Scroll ── */
::-webkit-scrollbar { width: 2px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.05); border-radius: 1px; }

/* ── Responsive ── */
@media (max-width: 420px) {
  .app { padding: 24px 12px 80px; }
  .glass-card { border-radius: var(--radius-lg); }
  .tool-content { padding: 28px 20px 24px; }
  .timer-ring-wrap { width: 160px; height: 160px; }
  .timer-display .time { font-size: 46px; }
  .dock-item { width: 38px; height: 36px; }
  .dock-item.scene-btn { width: 28px; height: 28px; }
  .dock { padding: 3px 4px; border-radius: 22px; gap: 1px; }
  .dock-divider { height: 18px; margin: 0 2px; }
}
@media (min-width: 768px) {
  .glass-card { max-width: 460px; }
  .timer-ring-wrap { width: 220px; height: 220px; }
  .timer-display .time { font-size: 64px; }
  .ai-panel { max-width: 480px; left: 50%; transform: translateX(-50%) translateY(100%); }
  .ai-panel.open { transform: translateX(-50%) translateY(0); border-radius: var(--radius-xl); }
}
@supports (padding: max(0px)) {
  .app { padding-left: max(20px, env(safe-area-inset-left)); padding-right: max(20px, env(safe-area-inset-right)); padding-top: max(40px, env(safe-area-inset-top)); padding-bottom: max(90px, env(safe-area-inset-bottom)); }
  .dock-wrap { bottom: max(16px, env(safe-area-inset-bottom)); }
}
</style>
</head>
<body>

<!-- Scene -->
<div class="scene" id="scene">
  <div class="scene-layer active" id="scene-bg"></div>
  <div class="scene-overlay"></div>
  <div class="scene-tint" id="scene-tint"></div>
  <div class="scene-vignette"></div>
</div>

<!-- Particles -->
<div class="particles" id="particles"></div>

<!-- App -->
<div class="app">
  <div class="app-inner">

    <!-- Glass Card + Tools -->
    <div class="glass-card" id="glass-card">
      <!-- Timer -->
      <div class="tool-content active" id="tool-timer">
        <div class="tool-header"><div class="icon">⏱</div><h2>专注</h2></div>
        <div style="text-align:center">
          <div class="timer-ring-wrap">
            <svg viewBox="0 0 100 100">
              <circle class="timer-ring-bg" cx="50" cy="50" r="42"/>
              <circle class="timer-ring-fg" id="timer-ring" cx="50" cy="50" r="42"
                stroke-dasharray="263.89" stroke-dashoffset="0"/>
            </svg>
            <div class="timer-display">
              <div class="time" id="timer-display">25:00</div>
              <div class="label" id="timer-label">专注</div>
            </div>
          </div>
          <div class="modes" id="mode-segmented">
            <button data-min="25" data-label="专注" class="active">专注</button>
            <button data-min="5" data-label="休息">短休</button>
            <button data-min="15" data-label="休息">长休</button>
          </div>
          <div class="actions">
            <button class="btn-primary" id="timer-toggle">开始</button>
            <button class="btn-secondary" id="timer-reset">重置</button>
          </div>
          <div class="focus-line" id="focus-quote">千里之行，始于足下</div>
        </div>
      </div>

      <!-- Todo -->
      <div class="tool-content" id="tool-todo">
        <div class="tool-header"><div class="icon">✓</div><h2>待办</h2></div>
        <div class="todo-input-row">
          <input type="text" id="todo-input" placeholder="添加待办…" autocomplete="off">
          <button id="todo-add-btn">添加</button>
        </div>
        <ul class="todo-list" id="todo-list"></ul>
      </div>

      <!-- Notes -->
      <div class="tool-content" id="tool-notes">
        <div class="tool-header"><div class="icon">✎</div><h2>便签</h2></div>
        <textarea class="notes-area" id="notes-area" placeholder="写点什么…"></textarea>
        <div class="notes-footer">
          <span id="notes-status">自动保存</span>
          <button id="notes-clear">清空</button>
        </div>
      </div>

      <!-- Sounds -->
      <div class="tool-content" id="tool-sounds">
        <div class="tool-header"><div class="icon">♪</div><h2>白噪音</h2></div>
        <div class="sound-grid" id="sound-board"></div>
        <div class="vol-row">
          <span style="font-size:11px;opacity:0.4">🔈</span>
          <input type="range" id="volume-slider" min="0" max="100" value="50">
          <span class="vol-label" id="vol-label">50</span>
        </div>

<script>
// ═══════════════════════════════════════════
//  Scenes
// ═══════════════════════════════════════════
const SCENES = [
  { id: 'dawn',  label: '晨曦', icon: '🌅', bg: 'linear-gradient(135deg, #1a1a2e 0%, #2d1b2e 30%, #4a2a3a 50%, #6a3a3a 70%, #8a5a4a 100%)', tint: 'rgba(212,150,100,0.06)' },
  { id: 'study', label: '书房', icon: '📚', bg: 'linear-gradient(135deg, #1a1612 0%, #2a2018 30%, #3a2a1a 60%, #2a2018 100%)', tint: 'rgba(212,168,106,0.06)' },
  { id: 'forest',label: '森林', icon: '🌲', bg: 'linear-gradient(135deg, #0a1a0a 0%, #0d2a0d 30%, #1a3a1a 60%, #0d2a0d 100%)', tint: 'rgba(100,180,100,0.04)' },
  { id: 'ocean', label: '深海', icon: '🌊', bg: 'linear-gradient(135deg, #0a0a1a 0%, #0a1a2a 30%, #0a2a3a 60%, #0a1a2a 100%)', tint: 'rgba(100,150,200,0.04)' },
  { id: 'night', label: '极夜', icon: '🌙', bg: 'linear-gradient(135deg, #0a0a0d 0%, #12121a 30%, #1a1a2a 60%, #0d0d12 100%)', tint: 'rgba(150,120,200,0.04)' },
];

const SOUNDS = [
  { id: 'rain',    icon: '🌧️',  name: '雨' },
  { id: 'wind',    icon: '🍃',  name: '风' },
  { id: 'fire',    icon: '🔥',  name: '火' },
  { id: 'coffee',  icon: '☕',  name: '咖啡' },
  { id: 'forest',  icon: '🌲',  name: '林' },
  { id: 'waves',   icon: '🌊',  name: '浪' },
  { id: 'cricket', icon: '🦗',  name: '夏' },
  { id: 'fan',     icon: '🌀',  name: '扇' },
];

const QUOTES = [
  '千里之行，始于足下', '学而不思则罔', '博学之，审问之',
  '业精于勤，荒于嬉', '不积跬步，无以至千里',
  '温故而知新', '宝剑锋从磨砺出', 'Stay hungry, stay foolish',
  'Less but better', 'Simplicity is the ultimate sophistication',
];

// ═══════════════════════════════════════════
//  State
// ═══════════════════════════════════════════
const state = {
  minutes: 25, seconds: 0, totalSeconds: 1500,
  isRunning: false, isBreak: false, interval: null,
  volume: 0.5, currentSound: null,
  audioCtx: null, gainNode: null, soundNodes: {},
  todayFocus: 0, todayTodos: 0,
  totalFocus: 0, totalSessions: 0,
  currentScene: 'dawn', customBg: null,
  currentTool: 'timer',
  aiOpen: false,
};

// ═══════════════════════════════════════════
//  DOM refs
// ═══════════════════════════════════════════
const $ = id => document.getElementById(id);
const sceneBg     = $('scene-bg');
const sceneTint   = $('scene-tint');
const timerDisp   = $('timer-display');
const timerRing   = $('timer-ring');
const timerLabel  = $('timer-label');
const timerToggle = $('timer-toggle');
const timerReset  = $('timer-reset');
const focusQuote  = $('focus-quote');
const glassCard   = $('glass-card');
const soundBoard  = $('sound-board');
const volSlider   = $('volume-slider');
const volLabel    = $('vol-label');
const todayFocus  = $('today-focus');
const todayTodos  = $('today-todos');
const totalFocus  = $('total-focus');
const totalSess   = $('total-sessions');
const todoInput   = $('todo-input');
const todoAdd     = $('todo-add-btn');
const todoList    = $('todo-list');
const notesArea   = $('notes-area');
const notesStatus = $('notes-status');
const notesClear  = $('notes-clear');
const musicInput  = $('music-url-input');
const musicLoad   = $('music-load-btn');
const musicEmbed  = $('music-embed');
const aiPanel     = $('ai-panel');
const aiOverlay   = $('ai-overlay');
const aiToggle    = $('ai-toggle');
const aiClose     = $('ai-close');
const aiHandle    = $('ai-handle');
const CIRCUMFERENCE = 2 * Math.PI * 42;

// ═══════════════════════════════════════════
//  Scene
// ═══════════════════════════════════════════
function applyScene(id) {
  const sc = SCENES.find(s => s.id === id) || SCENES[0];
  state.currentScene = id;
  sceneBg.style.background = sc.bg;
  sceneTint.style.setProperty('background', sc.tint);
  document.querySelectorAll('.scene-btn').forEach(b => b.classList.toggle('active', b.dataset.scene === id));
  localStorage.setItem('zxs_scene', id);
}

// ═══════════════════════════════════════════
//  Particles
// ═══════════════════════════════════════════
function createParticles() {
  const c = document.getElementById('particles');
  for (let i = 0; i < 15; i++) {
    const p = document.createElement('div'); p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.width = p.style.height = (1 + Math.random() * 2) + 'px';
    p.style.background = `rgba(255,255,255,${0.1 + Math.random() * 0.2})`;
    p.style.animationDuration = (20 + Math.random() * 25) + 's';
    p.style.animationDelay = Math.random() * 20 + 's';
    c.appendChild(p);
  }
}

// ═══════════════════════════════════════════
//  Tool switching (Dock)
// ═══════════════════════════════════════════
function switchTool(id) {
  state.currentTool = id;
  document.querySelectorAll('.tool-content').forEach(el => el.classList.remove('active'));
  const tool = document.getElementById('tool-' + id);
  if (tool) tool.classList.add('active');
  document.querySelectorAll('#tool-dock .dock-item').forEach(b => b.classList.toggle('active', b.dataset.tool === id));
}

// ═══════════════════════════════════════════
//  Timer
// ═══════════════════════════════════════════
function fmt(m, s) { return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`; }
function updateDisplay() {
  timerDisp.textContent = fmt(state.minutes, state.seconds);
  const elapsed = state.totalSeconds - (state.minutes * 60 + state.seconds);
  timerRing.setAttribute('stroke-dashoffset', CIRCUMFERENCE * (1 - elapsed / state.totalSeconds));
  timerLabel.textContent = state.isBreak ? '休息' : '专注';
  document.title = `${fmt(state.minutes, state.seconds)} — 自习室`;
}
function setTimer(min, label) {
  if (state.isRunning) stopTimer();
  state.minutes = min; state.seconds = 0; state.totalSeconds = min * 60;
  state.isBreak = label === '休息';
  updateDisplay(); timerToggle.textContent = '开始'; timerToggle.className = 'btn-primary';
}
function startTimer() {
  if (state.minutes === 0 && state.seconds === 0) return;
  state.isRunning = true; timerToggle.textContent = '暂停'; timerToggle.className = 'btn-secondary';
  state.interval = setInterval(tick, 1000);
}
function stopTimer() {
  state.isRunning = false; clearInterval(state.interval); state.interval = null;
  timerToggle.textContent = '继续'; timerToggle.className = 'btn-primary';
}
function resetTimer() {
  stopTimer();
  const act = document.querySelector('#mode-segmented .active');
  setTimer(parseInt(act.dataset.min), act.dataset.label);
  timerToggle.textContent = '开始'; timerToggle.className = 'btn-primary';
}
function tick() {
  if (state.seconds === 0) {
    if (state.minutes === 0) {
      stopTimer(); timerToggle.textContent = '完成'; timerToggle.className = 'btn-primary';
      state.todayFocus += state.totalSeconds / 60;
      state.totalFocus += state.totalSeconds / 60;
      state.totalSessions++;
      updateStats(); beep();
      focusQuote.textContent = QUOTES[Math.floor(Math.random() * QUOTES.length)];
      return;
    }
    state.minutes--; state.seconds = 59;
  } else { state.seconds--; }
  updateDisplay();
}
function beep() {
  try {
    if (!state.audioCtx) return;
    const osc = state.audioCtx.createOscillator();
    const g = state.audioCtx.createGain();
    osc.connect(g); g.connect(state.audioCtx.destination);
    osc.frequency.value = 800; osc.type = 'sine';
    g.gain.value = 0.15; osc.start();
    g.gain.exponentialRampToValueAtTime(0.001, state.audioCtx.currentTime + 0.5);
    osc.stop(state.audioCtx.currentTime + 0.5);
  } catch(e) {}
}

// ═══════════════════════════════════════════
//  Sound Engine
// ═══════════════════════════════════════════
function initAudio() {
  if (state.audioCtx) return;
  state.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  state.gainNode = state.audioCtx.createGain();
  state.gainNode.gain.value = state.volume;
  state.gainNode.connect(state.audioCtx.destination);
}
function mkNoise(type) {
  const ctx = state.audioCtx;
  const g = ctx.createGain(); g.gain.value = 1; g.connect(state.gainNode);
  let src;
  const buf = (l) => { const b = ctx.createBuffer(1, ctx.sampleRate * l, ctx.sampleRate); const d = b.getChannelData(0); for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1; return b; };
  switch (type) {
    case 'rain': {
      const b = buf(2); src = ctx.createBufferSource(); src.buffer = b; src.loop = true;
      const lp = ctx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 1000;
      const hp = ctx.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 200;
      src.connect(lp).connect(hp).connect(g); break;
    }
    case 'wind': {
      const b = buf(2); src = ctx.createBufferSource(); src.buffer = b; src.loop = true;
      const lp = ctx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 600;
      const hp = ctx.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 100;
      src.connect(lp).connect(hp).connect(g);
      const lfo = ctx.createOscillator(); const lfoG = ctx.createGain();
      lfo.frequency.value = 0.1; lfoG.gain.value = 300;
      lfo.connect(lfoG); lfoG.connect(lp.frequency); lfo.start(); break;
    }
    case 'fire': {
      const b = buf(1); src = ctx.createBufferSource(); src.buffer = b; src.loop = true;
      const bp = ctx.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 400; bp.Q.value = 0.8;
      src.connect(bp).connect(g); g.gain.value = 0.6;
      const cr = ctx.createOscillator(); const crG = ctx.createGain();
      cr.frequency.value = 3; crG.gain.value = 0.15;
      cr.connect(crG); crG.connect(g.gain); cr.start(); break;
    }
    case 'coffee': {
      const b = buf(2); src = ctx.createBufferSource(); src.buffer = b; src.loop = true;
      const lp = ctx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 200;
      src.connect(lp).connect(g); g.gain.value = 0.3; break;
    }
    case 'forest': {
      const b = ctx.createBuffer(1, ctx.sampleRate * 3, ctx.sampleRate); const d = b.getChannelData(0);
      for (let i = 0; i < d.length; i++) { const t = i / ctx.sampleRate; d[i] = (Math.random() * 2 - 1) * 0.3 + (Math.random() > 0.98 ? Math.sin(t * 2000) * 0.4 : 0); }
      src = ctx.createBufferSource(); src.buffer = b; src.loop = true;
      const hp = ctx.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 500;
      src.connect(hp).connect(g); break;
    }
    case 'waves': {
      const b = ctx.createBuffer(1, ctx.sampleRate * 4, ctx.sampleRate); const d = b.getChannelData(0);
      for (let i = 0; i < d.length; i++) { const t = i / ctx.sampleRate; d[i] = (Math.random() * 2 - 1) * (0.5 + 0.5 * Math.sin(t * 0.15)); }
      src = ctx.createBufferSource(); src.buffer = b; src.loop = true;
      const lp = ctx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 800;
      src.connect(lp).connect(g); break;
    }
    case 'cricket': {
      src = ctx.createOscillator(); src.type = 'sine'; src.frequency.value = 4800;
      const g2 = ctx.createGain(); src.connect(g2).connect(g);
      const lfo = ctx.createOscillator(); const lfoG = ctx.createGain();
      lfo.frequency.value = 4; lfoG.gain.value = 0.5;
      lfo.connect(lfoG); lfoG.connect(g2.gain); lfo.start(); g.gain.value = 0.1; break;
    }
    case 'fan': {
      const b = buf(2); src = ctx.createBufferSource(); src.buffer = b; src.loop = true;
      const lp = ctx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 300;
      src.connect(lp).connect(g); break;
    }
    default: return null;
  }
  return { source: src, gain: g };
}
function playSound(id) {
  initAudio(); if (state.audioCtx.state === 'suspended') state.audioCtx.resume();
  stopSound(); const n = mkNoise(id); if (!n) return;
  n.source.start(); state.currentSound = id; state.soundNodes[id] = n;
  document.querySelectorAll('.sound-btn').forEach(b => b.classList.toggle('playing', b.dataset.sound === id));
}
function stopSound() {
  if (state.currentSound && state.soundNodes[state.currentSound]) {
    try { state.soundNodes[state.currentSound].source.stop(); } catch(e) {}
    delete state.soundNodes[state.currentSound];
  }
  state.currentSound = null;
  document.querySelectorAll('.sound-btn').forEach(b => b.classList.remove('playing'));
}

// ═══════════════════════════════════════════
//  Music
// ═══════════════════════════════════════════
function toEmbedUrl(url) {
  let src = '';
  if (url.includes('music.apple.com') || url.includes('embed.music.apple.com')) {
    let m = url.match(/music\.apple\.com(\/[^\s?#]+)/);
    if (!m) m = url.match(/embed\.music\.apple\.com(\/[^\s?#]+)/);
    if (m) src = 'https://embed.music.apple.com' + m[1] + '?app=music';
  } else if (url.includes('open.spotify.com')) {
    let m = url.match(/open\.spotify\.com(\/[^\s?#]+)/);
    if (m) { let p = m[1]; if (!p.includes('/embed/')) p = p.replace(/\/(playlist|track|album|episode)\//, '/embed/$1/'); src = 'https://open.spotify.com' + p; }
  } else if (url.includes('embed.music.apple.com') || url.includes('open.spotify.com/embed')) { src = url; }
  return src;
}
function loadMusicUrl(url) {
  const src = toEmbedUrl(url);
  if (!src) return;
  musicEmbed.innerHTML = `<iframe src="${src.replace(/&/g,'&amp;').replace(/"/g,'&quot;')}" height="120" allow="autoplay *; encrypted-media *" sandbox="allow-forms allow-scripts allow-same-origin allow-popups"></iframe>`;
  musicInput.value = url;
}

// ═══════════════════════════════════════════
//  Todos
// ═══════════════════════════════════════════
let todos = [];
function loadTodos() { try { return JSON.parse(localStorage.getItem('zxs_todos')) || []; } catch { return []; } }
function saveTodos() { localStorage.setItem('zxs_todos', JSON.stringify(todos)); }
function renderTodos() {
  todoList.innerHTML = '';
  todos.forEach((t, i) => {
    const li = document.createElement('li');
    const ch = document.createElement('div'); ch.className = 'check' + (t.done ? ' done' : '');
    ch.addEventListener('click', () => { todos[i].done = !todos[i].done; saveTodos(); renderTodos(); });
    const tx = document.createElement('span'); tx.className = 'text' + (t.done ? ' done' : ''); tx.textContent = t.text;
    const del = document.createElement('button'); del.className = 'del'; del.textContent = '✕';
    del.addEventListener('click', () => { todos.splice(i,1); saveTodos(); renderTodos(); });
    li.append(ch, tx, del); todoList.appendChild(li);
  });
  state.todayTodos = todos.filter(t => t.done).length; updateStats();
}
function addTodo(text) { if (!text.trim()) return; todos.push({ text: text.trim(), done: false }); saveTodos(); renderTodos(); }

// ═══════════════════════════════════════════
//  Notes
// ═══════════════════════════════════════════
function loadNotes() {
  const saved = localStorage.getItem('zxs_notes');
  if (saved) notesArea.value = saved;
}
function saveNotes() {
  localStorage.setItem('zxs_notes', notesArea.value);
  notesStatus.textContent = '已保存';
  setTimeout(() => { notesStatus.textContent = '自动保存'; }, 2000);
}

// ═══════════════════════════════════════════
//  Stats
// ═══════════════════════════════════════════
function updateStats() {
  todayFocus.textContent = Math.round(state.todayFocus);
  todayTodos.textContent = state.todayTodos;
  totalFocus.textContent = Math.round(state.totalFocus);
  totalSess.textContent = state.totalSessions;
  localStorage.setItem('zxs_focus', state.todayFocus);
  localStorage.setItem('zxs_total_focus', state.totalFocus);
  localStorage.setItem('zxs_sessions', state.totalSessions);
}
function loadStats() {
  try {
    const f = localStorage.getItem('zxs_focus'); if (f) state.todayFocus = parseFloat(f);
    const tf = localStorage.getItem('zxs_total_focus'); if (tf) state.totalFocus = parseFloat(tf);
    const s = localStorage.getItem('zxs_sessions'); if (s) state.totalSessions = parseInt(s);
  } catch {}
}

// ═══════════════════════════════════════════
//  AI Panel
// ═══════════════════════════════════════════
function toggleAI(open) {
  state.aiOpen = open !== undefined ? open : !state.aiOpen;
  aiPanel.classList.toggle('open', state.aiOpen);
  aiOverlay.classList.toggle('open', state.aiOpen);
  if (state.aiOpen) document.body.style.overflow = 'hidden';
  else document.body.style.overflow = '';
}

// ═══════════════════════════════════════════
//  Init
// ═══════════════════════════════════════════
function init() {
  createParticles();
  const savedScene = localStorage.getItem('zxs_scene') || 'dawn';
  applyScene(savedScene);

  todos = loadTodos();
  loadStats();
  loadNotes();
  renderTodos();
  updateStats();
  updateDisplay();
  focusQuote.textContent = QUOTES[Math.floor(Math.random() * QUOTES.length)];

  // Sound board
  soundBoard.innerHTML = '';
  SOUNDS.forEach(s => {
    const btn = document.createElement('button'); btn.className = 'sound-btn'; btn.dataset.sound = s.id;
    btn.innerHTML = `<span class="icon">${s.icon}</span><span class="sname">${s.name}</span>`;
    btn.addEventListener('click', () => { if (state.currentSound === s.id) stopSound(); else playSound(s.id); });
    soundBoard.appendChild(btn);
  });

  // Scene buttons
  document.querySelectorAll('.scene-btn').forEach(btn => {
    btn.addEventListener('click', () => applyScene(btn.dataset.scene));
  });

  // Tool dock
  document.querySelectorAll('#tool-dock .dock-item').forEach(btn => {
    btn.addEventListener('click', () => switchTool(btn.dataset.tool));
  });

  // Timer modes
  document.querySelectorAll('#mode-segmented button').forEach(btn => {
    btn.addEventListener('click', () => {
      if (state.isRunning) stopTimer();
      document.querySelectorAll('#mode-segmented button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      setTimer(parseInt(btn.dataset.min), btn.dataset.label);
      timerToggle.textContent = '开始'; timerToggle.className = 'btn-primary';
    });
  });
  timerToggle.addEventListener('click', () => {
    if (state.isRunning) { stopTimer(); return; }
    if (timerToggle.textContent === '完成') { resetTimer(); return; }
    initAudio(); if (state.audioCtx && state.audioCtx.state === 'suspended') state.audioCtx.resume(); startTimer();
  });
  timerReset.addEventListener('click', resetTimer);

  // Volume
  volSlider.addEventListener('input', () => {
    state.volume = volSlider.value / 100; volLabel.textContent = volSlider.value;
    if (state.gainNode) state.gainNode.gain.value = state.volume;
  });

  // Music
  musicLoad.addEventListener('click', () => { const u = musicInput.value.trim(); if (u) loadMusicUrl(u); });
  musicInput.addEventListener('keydown', e => { if (e.key === 'Enter') musicLoad.click(); });

  // Todo
  todoAdd.addEventListener('click', () => { addTodo(todoInput.value); todoInput.value = ''; todoInput.focus(); });
  todoInput.addEventListener('keydown', e => { if (e.key === 'Enter') { addTodo(todoInput.value); todoInput.value = ''; } });

  // Notes
  let notesTimer;
  notesArea.addEventListener('input', () => {
    notesStatus.textContent = '输入中…';
    clearTimeout(notesTimer);
    notesTimer = setTimeout(saveNotes, 800);
  });
  notesClear.addEventListener('click', () => { if (confirm('清空便签？')) { notesArea.value = ''; saveNotes(); } });

  // AI panel
  aiToggle.addEventListener('click', () => toggleAI());
  aiClose.addEventListener('click', () => toggleAI(false));
  aiOverlay.addEventListener('click', () => toggleAI(false));
  aiHandle.addEventListener('click', () => toggleAI(false));

  // Periodic quote
  setInterval(() => { if (state.isRunning) focusQuote.textContent = QUOTES[Math.floor(Math.random() * QUOTES.length)]; }, 600000);
}

document.addEventListener('DOMContentLoaded', init);
if (document.readyState !== 'loading') init();
</script>
</body>
</html>
