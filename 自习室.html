<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<title>自习室</title>
<style>
:root {
  --font: -apple-system, 'Helvetica Neue', 'PingFang SC', sans-serif;
  --font-mono: 'SF Mono', 'Menlo', monospace;
  --radius-lg: 24px;
  --radius-pill: 40px;
  --blur: 40px;
  --card-bg: rgba(255,255,255,0.55);
  --card-border: rgba(255,255,255,0.35);
  --card-shadow: 0 8px 40px rgba(0,0,0,0.12);
  --text: #1d1d1f;
  --text-secondary: #86868b;
  --text-tertiary: #aeaeb2;
  --accent: #8B6F4E;
  --accent-hover: #7A5E3E;
  --fill: rgba(120,120,128,0.12);
  --fill-hover: rgba(120,120,128,0.18);
  --separator: rgba(60,60,67,0.06);
  --ring-bg: rgba(120,120,128,0.12);
  --ring-fg: #8B6F4E;
  --scene-dim: rgba(0,0,0,0.25);
}
* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  height: 100%; overflow: hidden;
  font-family: var(--font);
  background: #000;
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  -webkit-tap-highlight-color: transparent;
}

/* ── Scene ── */
.scene {
  position: fixed; inset: 0; z-index: 0;
  background: #1a1a1e;
}
.scene-layer {
  position: absolute; inset: 0;
  background-size: cover;
  background-position: center;
  opacity: 0;
  transition: opacity 0.8s cubic-bezier(0.25,0.1,0.25,1);
  will-change: opacity;
}
.scene-layer.active { opacity: 1; }
.scene-layer.dim {
  background: var(--scene-dim);
  opacity: 1;
  z-index: 1;
}
.scene-vignette {
  position: absolute; inset: 0; z-index: 2;
  background:
    radial-gradient(ellipse 120% 50% at 50% 0%, rgba(0,0,0,0.4) 0%, transparent 60%),
    radial-gradient(ellipse 100% 100% at 50% 100%, rgba(0,0,0,0.5) 0%, transparent 50%);
  pointer-events: none;
}

/* ── Layout ── */
.app {
  position: fixed; inset: 0; z-index: 3;
  display: flex; flex-direction: column;
  align-items: center;
  padding: 60px 24px 100px;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.app-inner {
  width: 100%;
  max-width: 420px;
  display: flex; flex-direction: column;
  align-items: center;
  gap: 16px;
  flex-shrink: 0;
  margin: auto;
}

/* ── Glass card ── */
.glass {
  background: var(--card-bg);
  backdrop-filter: blur(var(--blur)) saturate(1.4);
  -webkit-backdrop-filter: blur(var(--blur)) saturate(1.4);
  border: 0.5px solid var(--card-border);
  border-radius: var(--radius-lg);
  box-shadow: var(--card-shadow);
  width: 100%;
  transition: opacity 0.35s ease, transform 0.35s cubic-bezier(0.25,0.1,0.25,1);
}

/* ── Timer ── */
.timer-card { padding: 40px 32px 32px; }
.timer-body { text-align: center; }

.timer-ring-wrap {
  position: relative;
  width: 200px; height: 200px;
  margin: 0 auto 24px;
}
.timer-ring-wrap svg {
  transform: rotate(-90deg);
  width: 100%; height: 100%;
}
.timer-ring-bg { fill: none; stroke: var(--ring-bg); stroke-width: 4; }
.timer-ring-fg {
  fill: none; stroke: var(--ring-fg); stroke-width: 4;
  stroke-linecap: round;
  transition: stroke-dashoffset 0.6s cubic-bezier(0.25,0.1,0.25,1);
}
.timer-display {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
}
.timer-display .time {
  font-family: var(--font-mono);
  font-size: 58px;
  font-weight: 500;
  letter-spacing: 4px;
  color: var(--text);
  line-height: 1;
  font-variant-numeric: tabular-nums;
}
.timer-display .label {
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 4px;
  color: var(--text-secondary);
  margin-top: 8px;
  text-transform: uppercase;
}

.segmented {
  display: inline-flex;
  background: var(--fill);
  border-radius: var(--radius-pill);
  padding: 2px;
  margin-bottom: 28px;
}
.segmented button {
  font-family: var(--font);
  font-size: 13px;
  font-weight: 500;
  padding: 7px 20px;
  border-radius: var(--radius-pill);
  border: none;
  background: transparent;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.25s cubic-bezier(0.25,0.1,0.25,1);
  -webkit-tap-highlight-color: transparent;
  white-space: nowrap;
}
.segmented button:active { transform: scale(0.96); }
.segmented button.active {
  background: #fff;
  color: var(--text);
  box-shadow: 0 1px 4px rgba(0,0,0,0.08), 0 1px 2px rgba(0,0,0,0.04);
}

.btn-row {
  display: flex;
  gap: 10px;
  justify-content: center;
  align-items: center;
}
.btn {
  font-family: var(--font);
  font-size: 15px;
  font-weight: 500;
  padding: 12px 32px;
  border-radius: var(--radius-pill);
  border: none;
  cursor: pointer;
  transition: all 0.25s cubic-bezier(0.25,0.1,0.25,1);
  -webkit-tap-highlight-color: transparent;
  min-width: 110px;
}
.btn:active { transform: scale(0.94); }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent-hover); }
.btn-secondary { background: var(--fill); color: var(--text-secondary); }
.btn-secondary:hover { background: var(--fill-hover); }

.focus-line {
  text-align: center;
  font-size: 12px;
  font-weight: 400;
  color: var(--text-tertiary);
  margin-top: 20px;
  letter-spacing: 2px;
  min-height: 18px;
}

/* ── Tab bar ── */
.tab-bar-wrap { width: 100%; display: flex; justify-content: center; }
.tab-bar {
  display: inline-flex;
  background: rgba(255,255,255,0.35);
  backdrop-filter: blur(30px);
  -webkit-backdrop-filter: blur(30px);
  border-radius: var(--radius-pill);
  padding: 3px;
  border: 0.5px solid rgba(255,255,255,0.25);
  gap: 1px;
}
.tab-bar button {
  font-family: var(--font);
  font-size: 13px;
  font-weight: 500;
  padding: 8px 20px;
  border-radius: var(--radius-pill);
  border: none;
  background: transparent;
  color: rgba(255,255,255,0.7);
  cursor: pointer;
  transition: all 0.25s cubic-bezier(0.25,0.1,0.25,1);
  -webkit-tap-highlight-color: transparent;
  white-space: nowrap;
}
.tab-bar button:active { transform: scale(0.96); }
.tab-bar button.active {
  background: rgba(255,255,255,0.3);
  color: #fff;
  backdrop-filter: blur(10px);
}

/* ── Panel ── */
.panel { display: none; padding: 24px 28px; }
.panel.active { display: block; }

/* ── Background upload ── */
.bg-upload-area {
  border: 1.5px dashed var(--separator);
  border-radius: 16px;
  padding: 40px 20px;
  text-align: center;
  cursor: pointer;
  transition: all 0.25s;
  background: var(--fill);
  position: relative;
  -webkit-tap-highlight-color: transparent;
}
.bg-upload-area:active { transform: scale(0.97); }
.bg-upload-area .icon { font-size: 36px; display: block; margin-bottom: 10px; opacity: 0.6; }
.bg-upload-area .hint {
  font-size: 14px;
  font-weight: 500;
  color: var(--text-secondary);
}
.bg-upload-area .sub {
  font-size: 12px;
  color: var(--text-tertiary);
  margin-top: 4px;
}
.bg-upload-area input {
  position: absolute; inset: 0;
  opacity: 0; cursor: pointer;
}
.bg-upload-area.has-bg {
  border-style: solid;
  border-color: var(--accent);
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 14px;
}
.bg-upload-area.has-bg .icon { font-size: 28px; margin-bottom: 0; }
.bg-upload-area.has-bg .hint { flex: 1; text-align: left; }
.bg-upload-area.has-bg .change-btn {
  font-size: 12px;
  font-weight: 500;
  padding: 6px 14px;
  border-radius: 16px;
  background: var(--accent);
  color: #fff;
  border: none;
  cursor: pointer;
}
.bg-upload-area.has-bg .change-btn:active { opacity: 0.8; }

/* ── Sound board ── */
.sound-board {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}
.sound-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 14px 8px;
  border-radius: 14px;
  border: none;
  background: var(--fill);
  cursor: pointer;
  transition: all 0.25s;
  -webkit-tap-highlight-color: transparent;
}
.sound-btn:active { transform: scale(0.94); }
.sound-btn .icon { font-size: 22px; line-height: 1; }
.sound-btn .sname {
  font-size: 11px;
  font-weight: 500;
  color: var(--text-secondary);
  font-family: var(--font);
}
.sound-btn.playing { background: var(--accent); }
.sound-btn.playing .sname { color: #fff; }

.volume-row {
  display: flex;
  align-items: center;
  gap: 12px;
  justify-content: center;
  margin-top: 16px;
}
.volume-row input[type="range"] {
  width: 140px;
  height: 3px;
  -webkit-appearance: none;
  appearance: none;
  background: var(--ring-bg);
  border-radius: 2px;
  outline: none;
}
.volume-row input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 18px; height: 18px;
  border-radius: 50%;
  background: #fff;
  cursor: pointer;
  border: none;
  box-shadow: 0 1px 4px rgba(0,0,0,0.15), 0 1px 2px rgba(0,0,0,0.08);
}
.volume-row .vol-icon { font-size: 14px; opacity: 0.5; }
.volume-row .vol-label {
  font-size: 13px;
  font-weight: 500;
  color: var(--text-secondary);
  min-width: 32px;
  text-align: right;
  font-variant-numeric: tabular-nums;
}

/* ── Stats row ── */
.stats-row {
  display: flex;
  gap: 28px;
  justify-content: center;
  margin-top: 16px;
  padding-top: 14px;
  border-top: 0.5px solid var(--separator);
}
.stat-item { text-align: center; }
.stat-item .num {
  display: block;
  font-family: var(--font-mono);
  font-size: 18px;
  font-weight: 600;
  color: var(--text);
  font-variant-numeric: tabular-nums;
}
.stat-item .lbl {
  font-size: 11px;
  font-weight: 500;
  color: var(--text-tertiary);
  margin-top: 2px;
}

/* ── Music ── */
.music-input-row {
  display: flex;
  gap: 8px;
  margin-bottom: 14px;
}
.music-input-row input {
  flex: 1;
  font-family: var(--font);
  font-size: 13px;
  font-weight: 400;
  padding: 10px 16px;
  border-radius: 12px;
  border: none;
  background: var(--fill);
  color: var(--text);
  outline: none;
}
.music-input-row input:focus { background: var(--fill-hover); }
.music-input-row input::placeholder { color: var(--text-tertiary); }
.music-input-row button {
  font-family: var(--font);
  font-size: 13px;
  font-weight: 500;
  padding: 10px 18px;
  border-radius: 12px;
  border: none;
  background: var(--accent);
  color: #fff;
  cursor: pointer;
  transition: all 0.25s;
  -webkit-tap-highlight-color: transparent;
}
.music-input-row button:active { transform: scale(0.94); }

.music-embed {
  width: 100%;
  border-radius: 12px;
  overflow: hidden;
  min-height: 80px;
  background: var(--fill);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  color: var(--text-tertiary);
  margin-bottom: 14px;
}
.music-embed iframe {
  width: 100%;
  border: none;
  border-radius: 12px;
}

/* ── Music playlist ── */
.music-playlist-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}
.music-playlist-header h4 {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
}
.music-playlist-header .count {
  font-size: 12px;
  color: var(--text-tertiary);
  font-weight: 500;
}
.music-playlist {
  list-style: none;
  max-height: 160px;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.music-playlist li {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 0;
  border-bottom: 0.5px solid var(--separator);
}
.music-playlist li:last-child { border-bottom: none; }
.music-playlist li .pl-icon { font-size: 16px; flex-shrink: 0; opacity: 0.6; }
.music-playlist li .pl-name {
  flex: 1;
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.music-playlist li .pl-source {
  font-size: 10px;
  font-weight: 500;
  color: var(--text-tertiary);
  padding: 2px 8px;
  border-radius: 8px;
  background: var(--fill);
  flex-shrink: 0;
}
.music-playlist li .pl-play {
  font-size: 16px;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 8px;
  border: none;
  background: transparent;
  color: var(--text-secondary);
  transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.music-playlist li .pl-play:active { background: var(--fill); }
.music-playlist li .pl-del {
  font-size: 14px;
  cursor: pointer;
  padding: 4px 6px;
  border-radius: 8px;
  border: none;
  background: transparent;
  color: var(--text-tertiary);
  transition: all 0.2s;
}
.music-playlist li .pl-del:active { color: #c0392b; }
.music-playlist-empty {
  text-align: center;
  font-size: 12px;
  color: var(--text-tertiary);
  padding: 20px 0;
}

/* ── Todo ── */
.todo-header { margin-bottom: 14px; }
.todo-header h3 { font-size: 14px; font-weight: 600; color: var(--text); }
.todo-add { display: flex; gap: 8px; }
.todo-add input {
  flex: 1;
  font-family: var(--font);
  font-size: 14px;
  padding: 10px 16px;
  border-radius: 12px;
  border: none;
  background: var(--fill);
  color: var(--text);
  outline: none;
}
.todo-add input:focus { background: var(--fill-hover); }
.todo-add input::placeholder { color: var(--text-tertiary); }
.todo-add button {
  font-family: var(--font);
  font-size: 14px;
  font-weight: 500;
  padding: 10px 18px;
  border-radius: 12px;
  border: none;
  background: var(--accent);
  color: #fff;
  cursor: pointer;
  transition: all 0.25s;
}
.todo-add button:active { transform: scale(0.94); }
.todo-list {
  list-style: none;
  margin-top: 6px;
  max-height: 180px;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.todo-list li {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 4px;
  border-bottom: 0.5px solid var(--separator);
}
.todo-list li:last-child { border-bottom: none; }
.todo-list li .check {
  width: 22px; height: 22px;
  border-radius: 50%;
  border: 1.5px solid var(--text-tertiary);
  cursor: pointer;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.todo-list li .check.done { background: var(--accent); border-color: var(--accent); }
.todo-list li .check.done::after {
  content: '';
  width: 8px; height: 4px;
  border-left: 1.5px solid #fff;
  border-bottom: 1.5px solid #fff;
  transform: rotate(-45deg) translateY(-1px);
}
.todo-list li .text { flex: 1; font-size: 14px; font-weight: 400; transition: all 0.2s; }
.todo-list li .text.done { text-decoration: line-through; color: var(--text-tertiary); }
.todo-list li .del {
  width: 28px; height: 28px;
  border: none;
  background: transparent;
  color: var(--text-tertiary);
  font-size: 15px;
  cursor: pointer;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.todo-list li .del:active { background: rgba(0,0,0,0.05); color: #c0392b; }

/* ── Scroll ── */
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--separator); border-radius: 2px; }

/* ── Responsive ── */
@media (min-width: 600px) {
  .app { padding: 80px 40px 120px; }
  .app-inner { max-width: 440px; gap: 20px; }
  .timer-card { padding: 48px 40px 36px; }
  .timer-ring-wrap { width: 220px; height: 220px; }
  .timer-display .time { font-size: 64px; }
  .panel { padding: 28px 32px; }
}
@media (max-width: 420px) {
  .app { padding: 40px 16px 80px; }
  .timer-card { padding: 28px 20px 24px; }
  .timer-ring-wrap { width: 170px; height: 170px; }
  .timer-display .time { font-size: 48px; }
  .panel { padding: 18px 16px; }
  .sound-board { grid-template-columns: repeat(4, 1fr); gap: 6px; }
  .sound-btn { padding: 10px 4px; }
  .sound-btn .icon { font-size: 18px; }
  .sound-btn .sname { font-size: 10px; }
  .segmented button { padding: 6px 14px; font-size: 12px; }
  .btn { padding: 10px 24px; font-size: 14px; min-width: 90px; }
}

@supports (padding: max(0px)) {
  .app { padding-left: max(24px, env(safe-area-inset-left)); padding-right: max(24px, env(safe-area-inset-right)); padding-top: max(60px, env(safe-area-inset-top)); padding-bottom: max(100px, env(safe-area-inset-bottom)); }
}
</style>
</head>
<body>

<div class="scene" id="scene">
  <div class="scene-layer dim"></div>
  <div class="scene-vignette"></div>
</div>

<div class="app">
  <div class="app-inner">

    <!-- Timer -->
    <div class="glass timer-card">
      <div class="timer-body">
        <div class="timer-ring-wrap">
          <svg viewBox="0 0 100 100">
            <circle class="timer-ring-bg" cx="50" cy="50" r="42"/>
            <circle class="timer-ring-fg" id="timer-ring" cx="50" cy="50" r="42"
              stroke-dasharray="263.89" stroke-dashoffset="0"/>
          </svg>
          <div class="timer-display">
            <div class="time" id="timer-display">25:00</div>
            <div class="label" id="timer-label">Focus</div>
          </div>
        </div>
        <div class="segmented" id="mode-segmented">
          <button data-min="25" data-label="Focus" class="active">专注</button>
          <button data-min="5" data-label="Break">短休</button>
          <button data-min="15" data-label="Break">长休</button>
        </div>
        <div class="btn-row">
          <button class="btn btn-primary" id="timer-toggle">开始学习</button>
          <button class="btn btn-secondary" id="timer-reset">重置</button>
        </div>
        <div class="focus-line" id="focus-quote">千里之行，始于足下</div>
      </div>
    </div>

    <!-- Tab Bar -->
    <div class="tab-bar-wrap">
      <div class="tab-bar">
        <button class="active" data-tab="bg">背景</button>
        <button data-tab="sounds">白噪音</button>
        <button data-tab="music">音乐</button>
        <button data-tab="todo">待办</button>
      </div>
    </div>

    <!-- Panel: Background -->
    <div class="glass panel active" id="panel-bg">
      <div class="bg-upload-area" id="bg-upload-area">
        <span class="icon">🖼</span>
        <div class="hint">点击选择背景图片</div>
        <div class="sub">支持 JPG / PNG，建议使用横构图照片</div>
        <input type="file" accept="image/*" id="bg-upload-input">
      </div>
    </div>

    <!-- Panel: Sounds -->
    <div class="glass panel" id="panel-sounds">
      <div class="sound-board" id="sound-board"></div>
      <div class="volume-row">
        <span class="vol-icon">🔈</span>
        <input type="range" id="volume-slider" min="0" max="100" value="50">
        <span class="vol-label" id="vol-label">50%</span>
      </div>
      <div class="stats-row">
        <div class="stat-item"><span class="num" id="today-focus">0</span><span class="lbl">今日专注</span></div>
        <div class="stat-item"><span class="num" id="today-todos">0</span><span class="lbl">已完成</span></div>
      </div>
    </div>

    <!-- Panel: Music -->
    <div class="glass panel" id="panel-music">
      <div class="music-input-row">
        <input type="text" id="music-url-input" placeholder="粘贴 Apple Music / Spotify 链接…">
        <button id="music-load-btn">加载</button>
      </div>
      <div class="music-embed" id="music-embed">
        <span>粘贴音乐链接开始播放</span>
      </div>
      <div class="music-playlist-header">
        <h4>我的歌单</h4>
        <span class="count" id="playlist-count">0 首</span>
      </div>
      <ul class="music-playlist" id="music-playlist">
        <li class="music-playlist-empty">还没有收藏的歌单</li>
      </ul>
    </div>

    <!-- Panel: Todo -->
    <div class="glass panel" id="panel-todo">
      <div class="todo-header"><h3>待办清单</h3></div>
      <div class="todo-add">
        <input type="text" id="todo-input" placeholder="添加待办…" autocomplete="off">
        <button id="todo-add-btn">添加</button>
      </div>
      <ul class="todo-list" id="todo-list"></ul>
    </div>

  </div>
</div>

<script>
// ═══════════════════════════════════════════
//  Data
// ═══════════════════════════════════════════
const SOUNDS = [
  { id: 'rain',    icon: '🌧️',  name: '雨声' },
  { id: 'wind',    icon: '🍃',  name: '风声' },
  { id: 'fire',    icon: '🔥',  name: '篝火' },
  { id: 'coffee',  icon: '☕',  name: '咖啡' },
  { id: 'forest',  icon: '🌲',  name: '森林' },
  { id: 'waves',   icon: '🌊',  name: '海浪' },
  { id: 'cricket', icon: '🦗',  name: '夏夜' },
  { id: 'fan',     icon: '🌀',  name: '风扇' },
];

const QUOTES = [
  '千里之行，始于足下', '学而不思则罔，思而不学则殆',
  '博学之，审问之，慎思之，明辨之，笃行之',
  '业精于勤，荒于嬉', '不积跬步，无以至千里',
  '温故而知新，可以为师矣',
  '宝剑锋从磨砺出，梅花香自苦寒来',
  '一份耕耘，一份收获', '天道酬勤',
  'Stay hungry, stay foolish',
  'Less but better', 'Simplicity is the ultimate sophistication',
];

// ═══════════════════════════════════════════
//  State
// ═══════════════════════════════════════════
const state = {
  minutes: 25, seconds: 0, totalSeconds: 1500,
  isRunning: false, isBreak: false, interval: null,
  volume: 0.5, currentSound: null,
  audioCtx: null, gainNode: null, soundNodes: {},
  todayFocus: 0, todayTodos: 0,
  customBg: null,
  playlist: [], // { id, name, url, source, icon }
};

// ═══════════════════════════════════════════
//  DOM refs
// ═══════════════════════════════════════════
const $ = id => document.getElementById(id);
const scene       = $('scene');
const timerDisp   = $('timer-display');
const timerRing   = $('timer-ring');
const timerLabel  = $('timer-label');
const timerToggle = $('timer-toggle');
const timerReset  = $('timer-reset');
const focusQuote  = $('focus-quote');
const bgArea      = $('bg-upload-area');
const bgInput     = $('bg-upload-input');
const soundBoard  = $('sound-board');
const volSlider   = $('volume-slider');
const volLabel    = $('vol-label');
const todayFocus  = $('today-focus');
const todayTodos  = $('today-todos');
const musicInput  = $('music-url-input');
const musicLoad   = $('music-load-btn');
const musicEmbed  = $('music-embed');
const playlistEl  = $('music-playlist');
const playlistCnt = $('playlist-count');
const todoInput   = $('todo-input');
const todoAdd     = $('todo-add-btn');
const todoList    = $('todo-list');

const CIRCUMFERENCE = 2 * Math.PI * 42;

// ═══════════════════════════════════════════
//  Background
// ═══════════════════════════════════════════
function applyCustomBg(url) {
  state.customBg = url;

  let layer = scene.querySelector('.scene-layer.custom');
  if (!layer) {
    layer = document.createElement('div');
    layer.className = 'scene-layer custom';
    scene.insertBefore(layer, scene.querySelector('.scene-vignette'));
  }
  layer.style.backgroundImage = `url(${url})`;
  requestAnimationFrame(() => { layer.style.opacity = '1'; });

  bgArea.classList.add('has-bg');
  bgArea.innerHTML = `
    <span class="icon">🖼</span>
    <span class="hint">背景已更换</span>
    <button class="change-btn" id="bg-change-btn">换一张</button>
    <input type="file" accept="image/*" id="bg-upload-input">
  `;
  document.getElementById('bg-change-btn').addEventListener('click', e => {
    e.stopPropagation();
    document.getElementById('bg-upload-input').click();
  });
  document.getElementById('bg-upload-input').addEventListener('change', onBgFile);

  localStorage.setItem('zxs_custom_bg', url);
}

function onBgFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => applyCustomBg(ev.target.result);
  reader.readAsDataURL(file);
}

function initBgUpload() {
  bgInput.addEventListener('change', onBgFile);
  const saved = localStorage.getItem('zxs_custom_bg');
  if (saved) applyCustomBg(saved);
}

// ═══════════════════════════════════════════
//  Timer
// ═══════════════════════════════════════════
function fmt(m, s) { return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`; }

function updateDisplay() {
  timerDisp.textContent = fmt(state.minutes, state.seconds);
  const elapsed = state.totalSeconds - (state.minutes * 60 + state.seconds);
  const offset = CIRCUMFERENCE * (1 - elapsed / state.totalSeconds);
  timerRing.setAttribute('stroke-dashoffset', offset);
  timerLabel.textContent = state.isBreak ? 'Break' : 'Focus';
  document.title = `${fmt(state.minutes, state.seconds)} — 自习室`;
}

function setTimer(min, label) {
  if (state.isRunning) stopTimer();
  state.minutes = min; state.seconds = 0;
  state.totalSeconds = min * 60;
  state.isBreak = label === 'Break';
  updateDisplay();
  timerToggle.textContent = '开始学习'; timerToggle.className = 'btn btn-primary';
}

function startTimer() {
  if (state.minutes === 0 && state.seconds === 0) return;
  state.isRunning = true;
  timerToggle.textContent = '暂停'; timerToggle.className = 'btn btn-secondary';
  state.interval = setInterval(tick, 1000);
}

function stopTimer() {
  state.isRunning = false;
  clearInterval(state.interval); state.interval = null;
  timerToggle.textContent = '继续'; timerToggle.className = 'btn btn-primary';
}

function resetTimer() {
  stopTimer();
  const act = document.querySelector('#mode-segmented .active');
  setTimer(parseInt(act.dataset.min), act.dataset.label);
  timerToggle.textContent = '开始学习'; timerToggle.className = 'btn btn-primary';
}

function tick() {
  if (state.seconds === 0) {
    if (state.minutes === 0) {
      stopTimer();
      timerToggle.textContent = '完成 ✓'; timerToggle.className = 'btn btn-primary';
      state.todayFocus += state.totalSeconds / 60;
      updateStats(); beep();
      focusQuote.textContent = QUOTES[Math.floor(Math.random() * QUOTES.length)];
      return;
    }
    state.minutes--; state.seconds = 59;
  } else { state.seconds--; }
  updateDisplay();
}

function beep() {
  try {
    if (!state.audioCtx) return;
    const osc = state.audioCtx.createOscillator();
    const g = state.audioCtx.createGain();
    osc.connect(g); g.connect(state.audioCtx.destination);
    osc.frequency.value = 800; osc.type = 'sine';
    g.gain.value = 0.3; osc.start();
    g.gain.exponentialRampToValueAtTime(0.001, state.audioCtx.currentTime + 0.6);
    osc.stop(state.audioCtx.currentTime + 0.6);
  } catch(e) {}
}

// ═══════════════════════════════════════════
//  Sound Engine
// ═══════════════════════════════════════════
function initAudio() {
  if (state.audioCtx) return;
  state.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  state.gainNode = state.audioCtx.createGain();
  state.gainNode.gain.value = state.volume;
  state.gainNode.connect(state.audioCtx.destination);
}

function mkNoise(type) {
  const ctx = state.audioCtx;
  const g = ctx.createGain(); g.gain.value = 1; g.connect(state.gainNode);
  let src;
  const buf = (len) => { const b = ctx.createBuffer(1, ctx.sampleRate * len, ctx.sampleRate); const d = b.getChannelData(0); for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1; return b; };
  switch (type) {
    case 'rain': {
      const b = buf(2); src = ctx.createBufferSource(); src.buffer = b; src.loop = true;
      const lp = ctx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 1000;
      const hp = ctx.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 200;
      src.connect(lp).connect(hp).connect(g); break;
    }
    case 'wind': {
      const b = buf(2); src = ctx.createBufferSource(); src.buffer = b; src.loop = true;
      const lp = ctx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 600;
      const hp = ctx.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 100;
      src.connect(lp).connect(hp).connect(g);
      const lfo = ctx.createOscillator(); const lfoG = ctx.createGain();
      lfo.frequency.value = 0.1; lfoG.gain.value = 300;
      lfo.connect(lfoG); lfoG.connect(lp.frequency); lfo.start(); break;
    }
    case 'fire': {
      const b = buf(1); src = ctx.createBufferSource(); src.buffer = b; src.loop = true;
      const bp = ctx.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 400; bp.Q.value = 0.8;
      src.connect(bp).connect(g); g.gain.value = 0.6;
      const cr = ctx.createOscillator(); const crG = ctx.createGain();
      cr.frequency.value = 3; crG.gain.value = 0.15;
      cr.connect(crG); crG.connect(g.gain); cr.start(); break;
    }
    case 'coffee': {
      const b = buf(2); src = ctx.createBufferSource(); src.buffer = b; src.loop = true;
      const lp = ctx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 200;
      src.connect(lp).connect(g); g.gain.value = 0.3; break;
    }
    case 'forest': {
      const b = ctx.createBuffer(1, ctx.sampleRate * 3, ctx.sampleRate);
      const d = b.getChannelData(0);
      for (let i = 0; i < d.length; i++) { const t = i / ctx.sampleRate; d[i] = (Math.random() * 2 - 1) * 0.3 + (Math.random() > 0.98 ? Math.sin(t * 2000) * 0.4 : 0); }
      src = ctx.createBufferSource(); src.buffer = b; src.loop = true;
      const hp = ctx.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 500;
      src.connect(hp).connect(g); break;
    }
    case 'waves': {
      const b = ctx.createBuffer(1, ctx.sampleRate * 4, ctx.sampleRate);
      const d = b.getChannelData(0);
      for (let i = 0; i < d.length; i++) { const t = i / ctx.sampleRate; d[i] = (Math.random() * 2 - 1) * (0.5 + 0.5 * Math.sin(t * 0.15)); }
      src = ctx.createBufferSource(); src.buffer = b; src.loop = true;
      const lp = ctx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 800;
      src.connect(lp).connect(g); break;
    }
    case 'cricket': {
      src = ctx.createOscillator(); src.type = 'sine'; src.frequency.value = 4800;
      const g2 = ctx.createGain(); src.connect(g2).connect(g);
      const lfo = ctx.createOscillator(); const lfoG = ctx.createGain();
      lfo.frequency.value = 4; lfoG.gain.value = 0.5;
      lfo.connect(lfoG); lfoG.connect(g2.gain); lfo.start();
      g.gain.value = 0.1; break;
    }
    case 'fan': {
      const b = buf(2); src = ctx.createBufferSource(); src.buffer = b; src.loop = true;
      const lp = ctx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 300;
      src.connect(lp).connect(g); break;
    }
    default: return null;
  }
  return { source: src, gain: g };
}

function playSound(id) {
  initAudio();
  if (state.audioCtx.state === 'suspended') state.audioCtx.resume();
  stopSound();
  const n = mkNoise(id);
  if (!n) return;
  n.source.start();
  state.currentSound = id;
  state.soundNodes[id] = n;
  updateSoundUI();
}

function stopSound() {
  if (state.currentSound && state.soundNodes[state.currentSound]) {
    try { state.soundNodes[state.currentSound].source.stop(); } catch(e) {}
    delete state.soundNodes[state.currentSound];
  }
  state.currentSound = null;
  updateSoundUI();
}

function updateSoundUI() {
  document.querySelectorAll('.sound-btn').forEach(b => b.classList.toggle('playing', b.dataset.sound === state.currentSound));
}

// ═══════════════════════════════════════════
//  Music + Playlist
// ═══════════════════════════════════════════
function detectMusicSource(url) {
  if (url.includes('music.apple.com') || url.includes('embed.music.apple.com')) return 'apple';
  if (url.includes('open.spotify.com') || url.includes('spotify.com/embed')) return 'spotify';
  return null;
}

function toEmbedUrl(url) {
  let src = '';
  if (url.includes('music.apple.com') || url.includes('embed.music.apple.com')) {
    let m = url.match(/music\.apple\.com(\/[^\s?#]+)/);
    if (!m) m = url.match(/embed\.music\.apple\.com(\/[^\s?#]+)/);
    if (m) src = 'https://embed.music.apple.com' + m[1] + '?app=music';
  } else if (url.includes('open.spotify.com')) {
    let m = url.match(/open\.spotify\.com(\/[^\s?#]+)/);
    if (m) { let p = m[1]; if (!p.includes('/embed/')) p = p.replace(/\/(playlist|track|album|episode)\//, '/embed/$1/'); src = 'https://open.spotify.com' + p; }
  } else if (url.includes('embed.music.apple.com') || url.includes('open.spotify.com/embed')) { src = url; }
  return src;
}

function extractName(url) {
  // Try to extract a readable name from the URL
  const match = url.match(/(?:playlist|album)\/([^/?]+)/i);
  if (match) return decodeURIComponent(match[1].replace(/-/g, ' '));
  return null;
}

function loadMusicUrl(url, saveToPlaylist = true) {
  const src = toEmbedUrl(url);
  if (!src) {
    musicEmbed.innerHTML = '<span style="color:#c0392b;">暂不支持的链接，请使用 Apple Music 或 Spotify</span>';
    return;
  }
  musicEmbed.innerHTML = `<iframe src="${src.replace(/&/g,'&amp;').replace(/"/g,'&quot;')}" height="120" allow="autoplay *; encrypted-media *; fullscreen *" sandbox="allow-forms allow-scripts allow-same-origin allow-popups"></iframe>`;
  musicInput.value = url;

  // Save to playlist
  if (saveToPlaylist) {
    const source = detectMusicSource(url);
    const sourceLabel = source === 'apple' ? 'Apple Music' : 'Spotify';
    const icon = source === 'apple' ? '🍎' : '🟢';
    let name = extractName(url);

    // Check if already in playlist
    const exists = state.playlist.some(p => p.url === url);
    if (!exists) {
      state.playlist.push({
        id: Date.now().toString(36) + Math.random().toString(36).slice(2,6),
        name: name || '音乐 ' + (state.playlist.length + 1),
        url: url,
        source: sourceLabel,
        icon: icon,
      });
      savePlaylist();
      renderPlaylist();
    }
  }

  localStorage.setItem('zxs_music_url', url);
}

function savePlaylist() {
  localStorage.setItem('zxs_playlist', JSON.stringify(state.playlist));
}

function loadPlaylist() {
  try {
    const data = localStorage.getItem('zxs_playlist');
    if (data) state.playlist = JSON.parse(data);
  } catch {}
}

function renderPlaylist() {
  playlistEl.innerHTML = '';
  playlistCnt.textContent = state.playlist.length + ' 首';

  if (state.playlist.length === 0) {
    playlistEl.innerHTML = '<li class="music-playlist-empty">还没有收藏的歌单</li>';
    return;
  }

  state.playlist.forEach((item, i) => {
    const li = document.createElement('li');

    const icon = document.createElement('span');
    icon.className = 'pl-icon';
    icon.textContent = item.icon || '🎵';

    const name = document.createElement('span');
    name.className = 'pl-name';
    name.textContent = item.name;

    const source = document.createElement('span');
    source.className = 'pl-source';
    source.textContent = item.source;

    const play = document.createElement('button');
    play.className = 'pl-play';
    play.textContent = '▶';
    play.addEventListener('click', e => {
      e.stopPropagation();
      musicInput.value = item.url;
      loadMusicUrl(item.url, false);
      // Switch to currently playing
      document.querySelectorAll('.music-playlist li').forEach(l => l.style.background = 'transparent');
      li.style.background = 'var(--accent-light, rgba(139,111,78,0.1))';
      li.style.borderRadius = '8px';
      li.style.padding = '8px 4px';
    });

    const del = document.createElement('button');
    del.className = 'pl-del';
    del.textContent = '✕';
    del.addEventListener('click', e => {
      e.stopPropagation();
      state.playlist.splice(i, 1);
      savePlaylist();
      renderPlaylist();
    });

    li.appendChild(icon);
    li.appendChild(name);
    li.appendChild(source);
    li.appendChild(play);
    li.appendChild(del);
    playlistEl.appendChild(li);
  });
}

// ═══════════════════════════════════════════
//  Todos
// ═══════════════════════════════════════════
let todos = [];
function loadTodos() { try { return JSON.parse(localStorage.getItem('zxs_todos')) || []; } catch { return []; } }
function saveTodos() { localStorage.setItem('zxs_todos', JSON.stringify(todos)); }
function renderTodos() {
  todoList.innerHTML = '';
  todos.forEach((t, i) => {
    const li = document.createElement('li');
    const ch = document.createElement('div');
    ch.className = 'check' + (t.done ? ' done' : '');
    ch.addEventListener('click', () => { todos[i].done = !todos[i].done; saveTodos(); renderTodos(); });
    const tx = document.createElement('span');
    tx.className = 'text' + (t.done ? ' done' : ''); tx.textContent = t.text;
    const del = document.createElement('button');
    del.className = 'del'; del.textContent = '✕';
    del.addEventListener('click', () => { todos.splice(i,1); saveTodos(); renderTodos(); });
    li.appendChild(ch); li.appendChild(tx); li.appendChild(del);
    todoList.appendChild(li);
  });
  state.todayTodos = todos.filter(t => t.done).length;
  updateStats();
}
function addTodo(text) { if (!text.trim()) return; todos.push({ text: text.trim(), done: false }); saveTodos(); renderTodos(); }

// ═══════════════════════════════════════════
//  Stats
// ═══════════════════════════════════════════
function updateStats() {
  todayFocus.textContent = Math.round(state.todayFocus);
  todayTodos.textContent = state.todayTodos;
  localStorage.setItem('zxs_focus', state.todayFocus);
}
function loadStats() { try { const f = localStorage.getItem('zxs_focus'); if (f) state.todayFocus = parseFloat(f); } catch {} }

// ═══════════════════════════════════════════
//  Sound board UI
// ═══════════════════════════════════════════
function buildSoundBoard() {
  soundBoard.innerHTML = '';
  SOUNDS.forEach(s => {
    const btn = document.createElement('button');
    btn.className = 'sound-btn';
    btn.dataset.sound = s.id;
    btn.innerHTML = `<span class="icon">${s.icon}</span><span class="sname">${s.name}</span>`;
    btn.addEventListener('click', () => { if (state.currentSound === s.id) stopSound(); else playSound(s.id); });
    soundBoard.appendChild(btn);
  });
}

// ═══════════════════════════════════════════
//  Init
// ═══════════════════════════════════════════
function init() {
  initBgUpload();
  todos = loadTodos();
  loadStats();
  loadPlaylist();
  buildSoundBoard();
  renderTodos();
  renderPlaylist();
  updateStats();
  updateDisplay();
  focusQuote.textContent = QUOTES[Math.floor(Math.random() * QUOTES.length)];

  // Restore last played music
  const savedMusic = localStorage.getItem('zxs_music_url');
  if (savedMusic) { musicInput.value = savedMusic; loadMusicUrl(savedMusic, false); }

  // Mode segmented
  document.querySelectorAll('#mode-segmented button').forEach(btn => {
    btn.addEventListener('click', () => {
      if (state.isRunning) stopTimer();
      document.querySelectorAll('#mode-segmented button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      setTimer(parseInt(btn.dataset.min), btn.dataset.label);
      timerToggle.textContent = '开始学习'; timerToggle.className = 'btn btn-primary';
    });
  });

  timerToggle.addEventListener('click', () => {
    if (state.isRunning) { stopTimer(); return; }
    if (timerToggle.textContent === '完成 ✓') { resetTimer(); return; }
    initAudio();
    if (state.audioCtx && state.audioCtx.state === 'suspended') state.audioCtx.resume();
    startTimer();
  });

  timerReset.addEventListener('click', resetTimer);

  volSlider.addEventListener('input', () => {
    state.volume = volSlider.value / 100;
    volLabel.textContent = volSlider.value + '%';
    if (state.gainNode) state.gainNode.gain.value = state.volume;
  });

  // Tabs
  document.querySelectorAll('.tab-bar button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-bar button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      const p = document.getElementById('panel-' + btn.dataset.tab);
      if (p) p.classList.add('active');
    });
  });

  // Music
  musicLoad.addEventListener('click', () => {
    const u = musicInput.value.trim();
    if (u) loadMusicUrl(u);
  });
  musicInput.addEventListener('keydown', e => { if (e.key === 'Enter') musicLoad.click(); });

  // Todo
  todoAdd.addEventListener('click', () => { addTodo(todoInput.value); todoInput.value = ''; todoInput.focus(); });
  todoInput.addEventListener('keydown', e => { if (e.key === 'Enter') { addTodo(todoInput.value); todoInput.value = ''; } });

  setInterval(() => { if (state.isRunning) focusQuote.textContent = QUOTES[Math.floor(Math.random() * QUOTES.length)]; }, 600000);
}

document.addEventListener('DOMContentLoaded', init);
if (document.readyState !== 'loading') init();
</script>
</body>
